version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongo_lab6
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: shop_db
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data: